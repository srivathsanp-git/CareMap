name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          # Copy build output to a temp dir outside the repo
          cp -r dist /tmp/dist-deploy

          # Fetch or create the gh-pages branch
          git fetch origin gh-pages:gh-pages 2>/dev/null || git checkout --orphan gh-pages

          git checkout gh-pages

          # Remove everything currently tracked
          git rm -rf . --quiet 2>/dev/null || true

          # Copy the new build in
          cp -r /tmp/dist-deploy/. .

          git add -A

          # Only commit if there are changes
          git diff --staged --quiet && echo "No changes to deploy" && exit 0

          git commit -m "deploy: ${{ github.sha }}"

          git push origin gh-pages
