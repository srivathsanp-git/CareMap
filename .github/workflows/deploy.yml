name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          # Stash the built output outside the repo
          DEPLOY_TMP=$(mktemp -d)
          cp -r dist/. "$DEPLOY_TMP/"
          touch "$DEPLOY_TMP/.nojekyll"

          # Fetch all remote refs
          git fetch origin

          # Switch to gh-pages (existing) or create orphan
          if git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
          fi

          # Wipe everything except .git
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +

          # Copy in the new build
          cp -r "$DEPLOY_TMP/." .

          git add -A

          if git diff --staged --quiet; then
            echo "No changes — skipping deploy"
            exit 0
          fi

          git commit -m "deploy: ${{ github.sha }}"
          git push origin gh-pages
